openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Pharmacy Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: medicines
  - name: categories
  - name: suppliers
  - name: customers
  - name: sales
  - name: purchases
  - name: payments
  - name: returns
  - name: expenses
  - name: inventory
  - name: stock-movements
  - name: audit-log
  - name: shifts
  - name: reports
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sales-chart:
    get:
      operationId: getDashboardSalesChart
      tags: [dashboard]
      summary: Get last 7 days sales and profit chart data
      responses:
        "200":
          description: Sales chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesChartPoint"

  /dashboard/alerts:
    get:
      operationId: getDashboardAlerts
      tags: [dashboard]
      summary: Get low stock and near-expiry alerts
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardAlerts"

  /medicines:
    get:
      operationId: getMedicines
      tags: [medicines]
      summary: List medicines
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, low_stock, expired, near_expiry]
        - name: category_id
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"
    post:
      operationId: createMedicine
      tags: [medicines]
      summary: Create a new medicine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"

  /medicines/{id}:
    get:
      operationId: getMedicine
      tags: [medicines]
      summary: Get medicine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    patch:
      operationId: updateMedicine
      tags: [medicines]
      summary: Update medicine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    delete:
      operationId: deleteMedicine
      tags: [medicines]
      summary: Delete medicine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /medicines/barcode/{barcode}:
    get:
      operationId: getMedicineByBarcode
      tags: [medicines]
      summary: Get medicine by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
        "404":
          description: Not found

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /suppliers:
    get:
      operationId: getSuppliers
      tags: [suppliers]
      summary: List suppliers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: List customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales:
    get:
      operationId: getSales
      tags: [sales]
      summary: List sales invoices
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: customer_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesList"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a sale invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get sale invoice details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleWithItems"

  /purchases:
    get:
      operationId: getPurchases
      tags: [purchases]
      summary: List purchase invoices
      parameters:
        - name: supplier_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase invoice and update stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}:
    get:
      operationId: getPurchase
      tags: [purchases]
      summary: Get purchase invoice details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseWithItems"

  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: List payments
      parameters:
        - name: party_type
          in: query
          schema:
            type: string
            enum: [supplier, customer]
        - name: party_id
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /returns:
    get:
      operationId: getReturns
      tags: [returns]
      summary: List returns
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [sale, purchase]
      responses:
        "200":
          description: List of returns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Return"
    post:
      operationId: createReturn
      tags: [returns]
      summary: Create a return
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Return"

  /expenses:
    get:
      operationId: getExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /inventory:
    get:
      operationId: getInventoryCount
      tags: [inventory]
      summary: Get inventory count list
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: saveInventoryCount
      tags: [inventory]
      summary: Save inventory count results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryCountInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryCountResult"

  /stock-movements:
    get:
      operationId: getStockMovements
      tags: [stock-movements]
      summary: List stock movements
      parameters:
        - name: medicine_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: type
          in: query
          schema:
            type: ["string", "null"]
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /audit-log:
    get:
      operationId: getAuditLog
      tags: [audit-log]
      summary: Get audit log entries
      parameters:
        - name: date_from
          in: query
          schema:
            type: ["string", "null"]
        - name: date_to
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  /shifts:
    get:
      operationId: getShifts
      tags: [shifts]
      summary: List cashier shifts
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    post:
      operationId: createShift
      tags: [shifts]
      summary: Open a new cashier shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShiftInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/{id}/close:
    post:
      operationId: closeShift
      tags: [shifts]
      summary: Close a cashier shift
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseShiftInput"
      responses:
        "200":
          description: Closed shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/active:
    get:
      operationId: getActiveShift
      tags: [shifts]
      summary: Get currently active shift
      responses:
        "200":
          description: Active shift or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftOrNull"

  /reports/expiry-analysis:
    get:
      operationId: getExpiryAnalysis
      tags: [reports]
      summary: Get expiry analysis for medicines
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1month, 3months, 6months]
            default: 3months
      responses:
        "200":
          description: Expiry analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpiryAnalysisItem"

  /reports/stock-by-category:
    get:
      operationId: getStockByCategory
      tags: [reports]
      summary: Stock summary by category
      responses:
        "200":
          description: Stock by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockByCategoryItem"

  /reports/top-selling:
    get:
      operationId: getTopSelling
      tags: [reports]
      summary: Top selling medicines
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top selling medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopSellingItem"

  /reports/profitability:
    get:
      operationId: getProfitabilityReport
      tags: [reports]
      summary: Profitability report by medicine
      responses:
        "200":
          description: Profitability report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfitabilityItem"

  /reports/daily-sales:
    get:
      operationId: getDailySalesReport
      tags: [reports]
      summary: Daily/monthly sales and profit summary
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, month, year]
            default: today
      responses:
        "200":
          description: Sales summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesSummary"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get pharmacy settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update pharmacy settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    DashboardSummary:
      type: object
      required: [todaySales, netProfit, totalMedicines, stockValue, expiredCount, lowStockCount]
      properties:
        todaySales:
          type: number
        netProfit:
          type: number
        totalMedicines:
          type: integer
        stockValue:
          type: number
        expiredCount:
          type: integer
        lowStockCount:
          type: integer

    SalesChartPoint:
      type: object
      required: [date, sales, profit]
      properties:
        date:
          type: string
        sales:
          type: number
        profit:
          type: number

    DashboardAlerts:
      type: object
      required: [lowStock, nearExpiry]
      properties:
        lowStock:
          type: array
          items:
            $ref: "#/components/schemas/MedicineAlert"
        nearExpiry:
          type: array
          items:
            $ref: "#/components/schemas/MedicineAlert"

    MedicineAlert:
      type: object
      required: [id, name, quantity, expiryDate]
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: integer
        expiryDate:
          type: ["string", "null"]
        reorderLevel:
          type: ["integer", "null"]

    Medicine:
      type: object
      required: [id, name, quantity, salePrice, purchasePrice]
      properties:
        id:
          type: integer
        barcode:
          type: ["string", "null"]
        name:
          type: string
        scientificName:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        purchasePrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        productionDate:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]
        reorderLevel:
          type: ["integer", "null"]
        createdAt:
          type: string

    MedicineInput:
      type: object
      required: [name, salePrice, purchasePrice, quantity]
      properties:
        barcode:
          type: ["string", "null"]
        name:
          type: string
        scientificName:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        location:
          type: ["string", "null"]
        purchasePrice:
          type: number
        salePrice:
          type: number
        quantity:
          type: integer
        productionDate:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]
        reorderLevel:
          type: ["integer", "null"]

    MedicineUpdate:
      type: object
      properties:
        barcode:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        scientificName:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        location:
          type: ["string", "null"]
        purchasePrice:
          type: ["number", "null"]
        salePrice:
          type: ["number", "null"]
        quantity:
          type: ["integer", "null"]
        productionDate:
          type: ["string", "null"]
        expiryDate:
